# Builds a real, installable Android APK on GitHub's servers (no local
# Android Studio / SDK needed) and attaches it to the workflow run as a
# downloadable artifact.
#
# WHERE TO PUT THIS FILE:
#   .github/workflows/build-apk.yml   (at the root of your git repo)
#
# HOW TO RUN IT:
#   1. Commit prms-mobile/ (including android/google-services.json — see
#      the Firebase steps in the setup guide) to a GitHub repo.
#   2. Push to `main`, or go to the "Actions" tab on GitHub and click
#      "Run workflow" to trigger it manually.
#   3. When it finishes (~8-12 min), open the run → "Artifacts" section
#      at the bottom → download "prms-mobile-debug-apk". It's a .zip
#      containing app-debug.apk — install that on any Android phone.

on:
  push:
    branches: [main]
    paths:
      - 'prms-mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch: {}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prms-mobile

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: prms-mobile/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Verify google-services.json is present
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "::error::android/app/google-services.json is missing."
            echo "Download it from Firebase Console > Project Settings > Your Apps"
            echo "and commit it to prms-mobile/android/app/ (see setup guide)."
            exit 1
          fi

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: prms-mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prms-mobile-debug-apk
          path: prms-mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

