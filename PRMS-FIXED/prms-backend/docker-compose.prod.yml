# =============================================================================
# PRMS — Docker Compose Production Stack
# Architecture Contract §14.4, §15.2
# Usage: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: '3.9'

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

x-restart: &default-restart
  restart: unless-stopped

services:

  # ── Nginx — SSL termination + reverse proxy ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: prms_nginx
    <<: *default-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
    logging: *default-logging
    networks:
      - frontend
      - backend

  # ── API — Node.js Express + Socket.IO ─────────────────────────────────────
  api:
    build:
      context: ../
      dockerfile: devops/docker/Dockerfile
      target: production
    image: prms-api:${IMAGE_TAG:-latest}
    container_name: prms_api
    <<: *default-restart
    expose:
      - "3000"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - api_logs:/app/logs
      - api_keys:/app/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    read_only: false        # logs dir needs write
    tmpfs:
      - /tmp

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: prms_mysql
    <<: *default-restart
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: prms_db
      MYSQL_USER: prms_user
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
    secrets:
      - mysql_root_password
      - mysql_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/prms.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow.log
      --long-query-time=1
      --general-log=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "prms_user", "--password=$$(cat /run/secrets/mysql_password)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  # ── Redis 7 ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prms_redis
    <<: *default-restart
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
      --protected-mode yes
      --bind 0.0.0.0
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - backend
    security_opt:
      - no-new-privileges:true

  # ── Certbot — auto-renew Let's Encrypt certs ────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: prms_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    logging: *default-logging

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  api_keys:
    driver: local
  nginx_cache:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true        # Backend network not reachable from outside

# ── Secrets ──────────────────────────────────────────────────────────────────
secrets:
  mysql_root_password:
    file: ./secrets/mysql_root_password.txt
  mysql_password:
    file: ./secrets/mysql_password.txt
