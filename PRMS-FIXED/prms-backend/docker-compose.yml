version: '3.9'

# Architecture Contract §14.4 — Local development setup
# Start infrastructure: docker-compose up -d mysql redis

services:
  mysql:
    image: mysql:8.0
    container_name: prms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password_dev_only
      MYSQL_DATABASE: prms_db
      MYSQL_USER: prms_user
      MYSQL_PASSWORD: prms_dev_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "prms_user", "-pprms_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prms_redis
    restart: unless-stopped
    command: redis-server --requirepass prms_redis_dev --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "prms_redis_dev", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: builder   # dev build with full devDeps
    container_name: prms_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src:ro
      - ./keys:/app/keys:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev

volumes:
  mysql_data:
  redis_data:
