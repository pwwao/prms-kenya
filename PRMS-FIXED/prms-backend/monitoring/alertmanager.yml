# =============================================================================
# Alertmanager Configuration
# Routes: critical → PagerDuty + Slack, warning → Slack only
# =============================================================================

global:
  resolve_timeout: 5m
  slack_api_url: '$SLACK_WEBHOOK_URL'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  group_by: ['alertname', 'severity']
  group_wait:      30s
  group_interval:  5m
  repeat_interval: 4h
  receiver: slack_devops

  routes:
    # Critical alerts → PagerDuty + Slack
    - match:
        severity: critical
      receiver: pagerduty_critical
      continue: true

    - match:
        severity: critical
      receiver: slack_critical

    # Security alerts → Security channel
    - match:
        team: security
      receiver: slack_security

    # Warning → DevOps Slack channel
    - match:
        severity: warning
      receiver: slack_devops

receivers:

  - name: slack_devops
    slack_configs:
      - channel: '#prms-alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} PRMS Alert'
        text: |
          *Alert:* {{ .CommonAnnotations.summary }}
          *Severity:* {{ .CommonLabels.severity }}
          *Environment:* production
          {{ range .Alerts }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: slack_critical
    slack_configs:
      - channel: '#prms-incidents'
        send_resolved: true
        title: '🚨 CRITICAL: {{ .CommonAnnotations.summary }}'
        text: |
          *Description:* {{ .CommonAnnotations.description }}
          *Runbook:* {{ .CommonAnnotations.runbook }}
          *Started:* {{ .CommonAnnotations.startsAt }}

  - name: slack_security
    slack_configs:
      - channel: '#prms-security'
        send_resolved: true
        title: '🔐 Security Alert: {{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

  - name: pagerduty_critical
    pagerduty_configs:
      - service_key: '$PAGERDUTY_SERVICE_KEY'
        description: '{{ .CommonAnnotations.summary }}'
        severity: critical
        details:
          firing: '{{ .Alerts.Firing | len }}'
          description: '{{ .CommonAnnotations.description }}'

inhibit_rules:
  # If API is down, suppress all other API-related alerts
  - source_match:
      alertname: APIDown
    target_match_re:
      alertname: '(SlowP95ResponseTime|HighErrorRate)'
    equal: ['job']
