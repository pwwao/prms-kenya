# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    project: prms

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:

  # PRMS API — prom-client metrics endpoint
  - job_name: prms_api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scrape_interval: 10s
    basic_auth:
      username: prometheus
      password_file: /run/secrets/prometheus_password

  # Node Exporter — host metrics
  - job_name: node_exporter
    static_configs:
      - targets: ['node-exporter:9100']

  # MySQL Exporter
  - job_name: mysql
    static_configs:
      - targets: ['mysql-exporter:9104']

  # Redis Exporter
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # Nginx Exporter
  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
