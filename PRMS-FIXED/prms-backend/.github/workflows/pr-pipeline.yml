# =============================================================================
# PRMS — PR Pipeline
# Architecture Contract §14.3 — Triggered on every PR to develop or main
# Gates: ESLint, TypeScript, Jest unit+integration tests, coverage ≥ 80%, Docker build
# =============================================================================

name: PR Pipeline

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  IMAGE_NAME: prms-api

jobs:
  # ── 1. Lint & Type Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

  # ── 2. Unit & Integration Tests ───────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-22.04
    needs: lint
    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root_test
          MYSQL_DATABASE: prms_test
          MYSQL_USER: prms_test
          MYSQL_PASSWORD: prms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u prms_test -pprms_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate test JWT keys
        run: |
          mkdir -p keys
          openssl genrsa -out keys/jwt.private.key 2048
          openssl rsa -in keys/jwt.private.key -pubout -out keys/jwt.public.key

      - name: Run migrations on test DB
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: prms_test
          DB_USER: prms_test
          DB_PASSWORD: prms_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_PRIVATE_KEY_PATH: ./keys/jwt.private.key
          JWT_PUBLIC_KEY_PATH: ./keys/jwt.public.key
          DATABASE_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          HASH_SALT: ${{ secrets.TEST_HASH_SALT }}
        run: npm run migrate

      - name: Run tests with coverage
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: prms_test
          DB_USER: prms_test
          DB_PASSWORD: prms_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_PRIVATE_KEY_PATH: ./keys/jwt.private.key
          JWT_PUBLIC_KEY_PATH: ./keys/jwt.public.key
          DATABASE_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          HASH_SALT: ${{ secrets.TEST_HASH_SALT }}
          JWT_ACCESS_EXPIRY: 900
          JWT_REFRESH_EXPIRY: 604800
          BCRYPT_ROUNDS: 4          # lower in tests for speed
          FCM_PROJECT_ID: test
          FCM_PRIVATE_KEY: test
          FCM_CLIENT_EMAIL: test@test.com
          AFRICASTALKING_API_KEY: test
          AFRICASTALKING_USERNAME: test
          SMTP_HOST: localhost
          SMTP_PORT: 1025
          SMTP_USER: test
          SMTP_PASSWORD: test
          SMTP_FROM_ADDRESS: test@test.com
          CORS_ALLOWED_ORIGINS: http://localhost:5173
          API_BASE_URL: http://localhost:3000
        run: npm run test:coverage

      - name: Check coverage threshold (≥ 80%)
        run: |
          COVERAGE=$(node -e "
            const c = require('./coverage/coverage-summary.json');
            const t = c.total;
            const min = Math.min(t.lines.pct, t.functions.pct, t.branches.pct, t.statements.pct);
            console.log(min);
          ")
          echo "Minimum coverage: $COVERAGE%"
          node -e "if ($COVERAGE < 80) { console.error('Coverage $COVERAGE% is below 80% threshold'); process.exit(1); }"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 14

      - name: Coverage summary comment
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
        with:
          working-directory: backend

  # ── 3. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-22.04
    needs: lint
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high/critical only)
        run: npm audit --audit-level=high

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          severity: HIGH,CRITICAL
          exit-code: 1
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 4. Docker build check ─────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — PR only)
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: devops/docker/Dockerfile
          push: false
          tags: ${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.pull_request.updated_at }}
            GIT_SHA=${{ github.sha }}
