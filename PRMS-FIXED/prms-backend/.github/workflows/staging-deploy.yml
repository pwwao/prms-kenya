# =============================================================================
# PRMS — Staging Deploy Pipeline
# Architecture Contract §14.3 — Auto-deploy to staging on merge to develop
# Steps: Build → Push ECR → Deploy → Smoke → E2E
# =============================================================================

name: Deploy — Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy
  cancel-in-progress: false      # never cancel a running staging deploy

env:
  NODE_VERSION: '20'
  AWS_REGION: af-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.af-south-1.amazonaws.com
  ECR_REPOSITORY: prms-api
  STAGING_HOST: ${{ secrets.STAGING_HOST }}

jobs:
  # ── 1. Build & Push Docker Image ─────────────────────────────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-22.04
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      full_image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=develop-${{ github.sha }}
            type=raw,value=staging-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: devops/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to Staging ─────────────────────────────────────────────────
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-22.04
    needs: build
    environment:
      name: staging
      url: https://staging-api.prms.health.go.ke

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy compose file to staging server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: devops/docker-compose.prod.yml,devops/nginx/,devops/docker/mysql/
          target: /opt/prms-staging/

      - name: Deploy on staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.STAGING_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/prms-staging
            export IMAGE_TAG=develop-${{ github.sha }}
            # Pull new image
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            docker pull ${{ needs.build.outputs.full_image }}
            # Rolling update — zero downtime
            docker-compose -f docker-compose.prod.yml up -d --no-deps api
            # Run migrations
            docker-compose -f docker-compose.prod.yml exec -T api node dist/database/migrate.js
            echo "Staging deploy complete: $IMAGE_TAG"

  # ── 3. Smoke Tests ───────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-22.04
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Health check
        run: |
          for i in {1..12}; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://staging-api.prms.health.go.ke/health || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: API smoke tests
        env:
          BASE_URL: https://staging-api.prms.health.go.ke
        run: |
          # Verify API envelope shape
          RESP=$(curl -sf "$BASE_URL/health")
          echo $RESP | jq -e '.status == "ok"' || exit 1

          # Verify 404 returns standard envelope
          RESP=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/api/v1/nonexistent")
          [ "$RESP" = "404" ] || exit 1

          # Verify auth is required
          RESP=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE_URL/api/v1/referrals")
          [ "$RESP" = "401" ] || exit 1

          echo "✅ All smoke tests passed"

  # ── 4. E2E Tests (Playwright) ────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-22.04
    needs: smoke
    defaults:
      run:
        working-directory: tests/e2e
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          BASE_URL: https://staging-api.prms.health.go.ke
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_CLINICIAN_EMAIL: ${{ secrets.E2E_CLINICIAN_EMAIL }}
          E2E_CLINICIAN_PASSWORD: ${{ secrets.E2E_CLINICIAN_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14
