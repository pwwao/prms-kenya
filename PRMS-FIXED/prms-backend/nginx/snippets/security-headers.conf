# =============================================================================
# Security Headers Snippet
# Included by all HTTPS virtual hosts
# OWASP A05:2021 — Security Misconfiguration
# =============================================================================

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# HSTS — 1 year, include subdomains, preload
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy — restrict browser features
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

# Content Security Policy
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' wss://api.prms.health.go.ke; font-src 'self'; object-src 'none'; frame-ancestors 'none';" always;

# Remove server identification
more_clear_headers Server;
add_header Server "PRMS" always;
