# =============================================================================
# PRMS — API Virtual Host
# Handles: REST API, Socket.IO WebSocket, Let's Encrypt renewal
# =============================================================================

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.prms.health.go.ke;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        limit_req zone=health_zone burst=5 nodelay;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.prms.health.go.ke;

    # ── SSL certificates (Let's Encrypt via Certbot) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.prms.health.go.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.prms.health.go.ke/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.prms.health.go.ke/chain.pem;

    # ── Security headers — OWASP A05 ─────────────────────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── Health check (no auth, high rate limit) ───────────────────────────────
    location = /health {
        limit_req zone=health_zone burst=20 nodelay;
        proxy_pass http://prms_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── Socket.IO — WebSocket upgrade ────────────────────────────────────────
    location /socket.io/ {
        limit_req zone=api_global burst=50 nodelay;

        proxy_pass http://prms_api;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $http_x_request_id;

        # WebSocket timeouts
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }

    # ── Auth endpoints — strict rate limiting ─────────────────────────────────
    location ~ ^/api/v1/auth/(login|verify-2fa|forgot-password) {
        limit_req zone=auth_zone burst=3 nodelay;

        proxy_pass http://prms_api;
        include /etc/nginx/snippets/proxy-params.conf;
    }

    # ── REST API ──────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_global burst=60 nodelay;

        proxy_pass http://prms_api;
        include /etc/nginx/snippets/proxy-params.conf;

        # Don't cache POST/PUT/PATCH/DELETE
        proxy_cache_bypass $request_method;
        proxy_no_cache     $request_method;
    }

    # ── Block common attack patterns ──────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi|sh|bash)$ {
        return 444;
    }

    location ~* (\.env|\.git|composer\.(json|lock)|package\.json) {
        return 444;
    }

    # Block SQL injection patterns in URI
    if ($request_uri ~* "(union|select|insert|drop|delete|update|exec|xp_)" ) {
        return 444;
    }

    # ── Default: 404 for unmapped paths ──────────────────────────────────────
    location / {
        return 404;
    }

    # ── Error pages ───────────────────────────────────────────────────────────
    error_page 429 /429.json;
    error_page 502 503 504 /50x.json;

    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"success":false,"error":{"code":"RATE_LIMIT_EXCEEDED","message":"Too many requests","details":[]},"meta":{"timestamp":"$time_iso8601"}}';
    }

    location = /50x.json {
        internal;
        default_type application/json;
        return 502 '{"success":false,"error":{"code":"INTERNAL_SERVER_ERROR","message":"Service temporarily unavailable","details":[]},"meta":{"timestamp":"$time_iso8601"}}';
    }
}
