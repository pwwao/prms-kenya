# =============================================================================
# PRMS — Nginx Main Configuration
# Architecture Contract §15.2 — SSL termination, proxy to port 3000
# Security: OWASP A05, CIS Nginx Benchmark Level 1
# =============================================================================

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basic settings ────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version (OWASP A05)
    server_tokens off;

    # Character set
    charset utf-8;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$http_x_request_id",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"user_agent":"$http_user_agent",'
            '"referer":"$http_referer"'
        '}';

    access_log /var/log/nginx/access.log json_combined buffer=16k flush=5s;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # Architecture Contract §8.6
    limit_req_zone $binary_remote_addr zone=api_global:10m    rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_zone:10m     rate=5r/m;
    limit_req_zone $binary_remote_addr zone=health_zone:1m    rate=60r/m;
    limit_req_status 429;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Connection limits ─────────────────────────────────────────────────────
    limit_conn conn_limit 50;

    # ── Proxy cache ───────────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m
                     max_size=100m inactive=60m use_temp_path=off;

    # ── SSL settings (global) ─────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Upstream — Backend API ────────────────────────────────────────────────
    upstream prms_api {
        server api:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Include virtual hosts ─────────────────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
